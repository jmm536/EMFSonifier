<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mag Diagnostic Rig</title>
    <style>
        body { background: #111; color: #fff; font-family: monospace; padding: 20px; font-size: 14px; }
        button { background: #00ff66; color: #000; border: none; padding: 15px; font-size: 16px; width: 100%; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        .telemetry-box { background: #222; border: 1px solid #444; padding: 15px; border-radius: 4px; margin-bottom: 10px; }
        .active { color: #00ff66; }
        .dead { color: #ff3333; }
    </style>
</head>
<body>

    <button id="startBtn">INITIALIZE ENGINE</button>

    <div class="telemetry-box">
        <h3>System Telemetry</h3>
        <div>Audio Context: <span id="audioStatus" class="dead">INACTIVE</span></div>
        <div>Current Audio Pitch: <span id="pitchStatus">0 Hz</span></div>
    </div>

    <div class="telemetry-box">
        <h3>Sensor Stream (Raw Output)</h3>
        <div>Event Fired Count: <span id="eventCount">0</span></div>
        <div>Alpha (Rotation): <span id="valAlpha" class="dead">Waiting...</span></div>
        <div>Absolute Orientation Support: <span id="absoluteSupport">Checking...</span></div>
    </div>

    <script>
        let audioCtx, oscillator, gainNode;
        let eventCounter = 0;

        const startBtn = document.getElementById('startBtn');
        const audioStatus = document.getElementById('audioStatus');
        const pitchStatus = document.getElementById('pitchStatus');
        const eventCount = document.getElementById('eventCount');
        const valAlpha = document.getElementById('valAlpha');
        const absoluteSupport = document.getElementById('absoluteSupport');

        // Check availability immediately on load
        if ('ondeviceorientationabsolute' in window) {
            absoluteSupport.innerText = "YES (Hardware Absolute Available)";
            absoluteSupport.className = "active";
        } else {
            absoluteSupport.innerText = "NO (Using standard orientation matrix)";
            absoluteSupport.className = "dead";
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx) return;

            // Fire up Web Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime); // Base fallback pitch
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            audioStatus.innerText = "RUNNING";
            audioStatus.className = "active";
            startBtn.innerText = "ENGINE LIVE";
            startBtn.style.background = "#444";
            startBtn.style.color = "#888";

            // Bind to both standard and absolute orientation pipelines
            window.addEventListener('deviceorientationabsolute', processMotion, true);
            window.addEventListener('deviceorientation', processMotion, true);
        });

        function processMotion(e) {
            eventCounter++;
            eventCount.innerText = eventCounter;

            // Extract the rotation vector
            let rotation = e.alpha;
            if (e.webkitCompassHeading) {
                rotation = e.webkitCompassHeading; // iOS hook stability
            }

            if (rotation !== null && rotation !== undefined) {
                valAlpha.innerText = `${rotation.toFixed(2)}°`;
                valAlpha.className = "active";

                // Map 0-360 degrees straight to 150Hz - 750Hz 
                // Direct assignment bypassing target time constants to remove processing lag
                const targetFreq = 150 + (rotation * 1.66);
                if (oscillator) {
                    oscillator.frequency.value = targetFreq;
                    pitchStatus.innerText = `${Math.round(targetFreq)} Hz`;
                }
            } else {
                valAlpha.innerText = "NULL (Sensor starved by browser security)";
                valAlpha.className = "dead";
            }
        }
    </script>
</body>
</html>

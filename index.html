<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive EMF Anomaly Matrix</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0a0a0a;
            color: #d0d0d0;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.3rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            background-color: #121212;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
        }

        .indicator-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #161616;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #222;
            transition: border-color 0.3s;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .control-group {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            background: #222;
            accent-color: #00ffcc;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            background-color: #00ffcc;
            color: #0a0a0a;
            transition: background 0.2s;
        }

        .readout {
            font-size: 2.4rem;
            font-family: monospace;
            color: #00ffcc;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            transition: color 0.3s;
        }

        canvas {
            background-color: #020202;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            width: 100%;
            height: 180px;
        }

        .log-panel {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            height: 110px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 8px;
            box-sizing: border-box;
            color: #aaa;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #00ffcc; padding-left: 6px; }
        .log-entry.alert { border-left-color: #ff4444; color: #ff9999; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Anomaly Detection Matrix</h1>

    <div class="grid-container">
        
        <div id="indicatorBar" class="indicator-bar">
            <span id="statusTxt" style="font-size: 0.85rem; font-weight: bold; color: #aaa;">SYSTEM UNARMED</span>
            <div id="statusDot" class="status-dot"></div>
        </div>

        <div class="panel">
            <button id="startBtn">Arm Adaptive System</button>

            <div class="control-group">
                <label for="threshold">Anomaly Sensitivity Threshold: <span id="threshVal">1.5</span>°</label>
                <input type="range" id="threshold" min="0.2" max="5.0" value="1.5" step="0.1">
            </div>

            <div class="control-group">
                <label for="audioGain">Voice Engine Max Volume</label>
                <input type="range" id="audioGain" min="0" max="1" value="0.3" step="0.05">
            </div>
        </div>

        <div class="readout" id="mainReadout"><span id="magDisplay">0.00</span>°</div>

        <canvas id="graphCanvas"></canvas>

        <div class="panel" style="padding: 10px;">
            <label style="margin-bottom: 6px; display: block;">Real-Time Operation Log</label>
            <div id="logPanel" class="log-panel">
                <div class="log-entry">System standing by. Adaptive baseline tracking ready.</div>
            </div>
        </div>

    </div>

    <script>
        let audioCtx = null;
        let masterGain = null;
        let vocalCords = null;
        let formantF1 = null, formantF2 = null;

        let isRunning = false;
        let adaptiveAlpha = null; // The drifting baseline tracker
        
        const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';

        const startBtn = document.getElementById('startBtn');
        const indicatorBar = document.getElementById('indicatorBar');
        const statusTxt = document.getElementById('statusTxt');
        const statusDot = document.getElementById('statusDot');
        const thresholdInput = document.getElementById('threshold');
        const threshVal = document.getElementById('threshVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        const mainReadout = document.getElementById('mainReadout');
        const logPanel = document.getElementById('logPanel');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        thresholdInput.addEventListener('input', (e) => { threshVal.textContent = e.target.value; });

        startBtn.addEventListener('click', async () => {
            if (isRunning) { stopMatrix(); return; }
            await startMatrix();
        });

        function logEvent(text, isAlert = false) {
            const timeStr = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = isAlert ? "log-entry alert" : "log-entry";
            entry.innerHTML = `[${timeStr}] ${text}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        async function startMatrix() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                vocalCords = audioCtx.createOscillator();
                vocalCords.type = 'sawtooth';
                vocalCords.frequency.setValueAtTime(80, audioCtx.currentTime); 

                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

                formantF1 = audioCtx.createBiquadFilter();
                formantF1.type = 'bandpass';
                formantF1.Q.setValueAtTime(25, audioCtx.currentTime);

                formantF2 = audioCtx.createBiquadFilter();
                formantF2.type = 'bandpass';
                formantF2.Q.setValueAtTime(20, audioCtx.currentTime);

                vocalCords.connect(formantF1);
                vocalCords.connect(formantF2);
                formantF1.connect(masterGain);
                formantF2.connect(masterGain);
                masterGain.connect(audioCtx.destination);
                
                vocalCords.start();

                if (typeof DeviceOrientationEvent !== 'undefined') {
                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const state = await DeviceOrientationEvent.requestPermission();
                        if (state === 'granted') mountSensor(); else throw new Error("Permission Denied");
                    } else {
                        mountSensor();
                    }
                } else {
                    throw new Error("Orientation APIs unsupported on this browser.");
                }
            } catch (err) {
                logEvent(`Initialization Aborted: ${err.message}`, true);
                stopMatrix();
            }
        }

        function mountSensor() {
            window.addEventListener(eventName, processTelemetry, true);
            isRunning = true;
            startBtn.textContent = "Halt System";
            startBtn.style.backgroundColor = "#ff4444";
            startBtn.style.color = "#fff";
            
            setTrackingUIState(false);
            logEvent("Adaptive tracking lines mounted. Monitoring dynamic shifts...");
            drawGraph();
        }

        function setTrackingUIState(isAnomaly) {
            if (isAnomaly) {
                statusTxt.textContent = "ANOMALY SPARK DETECTED";
                statusTxt.style.color = "#ff4444";
                statusDot.style.backgroundColor = "#ff4444";
                indicatorBar.style.borderColor = "#ff4444";
                mainReadout.style.color = "#ff4444";
            } else {
                statusTxt.textContent = "ARMED & DRIFT TRACKING";
                statusTxt.style.color = "#00ffcc";
                statusDot.style.backgroundColor = "#00ffcc";
                indicatorBar.style.borderColor = "#222";
                mainReadout.style.color = "#00ffcc";
            }
        }

        function stopMatrix() {
            window.removeEventListener(eventName, processTelemetry, true);
            if (vocalCords) { try { vocalCords.stop(); } catch(e) {} vocalCords.disconnect(); }
            if (formantF1) { formantF1.disconnect(); formantF2.disconnect(); }
            if (masterGain) masterGain.disconnect();

            isRunning = false;
            adaptiveAlpha = null;
            
            startBtn.textContent = "Arm Adaptive System";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#0a0a0a";
            
            statusTxt.textContent = "SYSTEM UNARMED";
            statusTxt.style.color = "#aaa";
            statusDot.style.backgroundColor = "#333";
            indicatorBar.style.borderColor = "#222";
            mainReadout.style.color = "#00ffcc";
            
            logEvent("Telemetry links severed. Voice synth offline.");
        }

        function processTelemetry(event) {
            const alpha = event.alpha || 0;

            // Initialize baseline on first frame
            if (adaptiveAlpha === null) {
                adaptiveAlpha = alpha;
                return;
            }

            // Calculate instantaneous angular distance from the fluid baseline
            let diff = alpha - adaptiveAlpha;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            const deviation = Math.abs(diff);

            magDisplay.textContent = deviation.toFixed(2);
            dataPoints.push(deviation);
            dataPoints.shift();

            // --- THE DRIFT ENGINE ---
            // Allow the baseline to slowly track towards the current orientation angle.
            // 0.04 means the baseline absorbs ~4% of the angle gap every single sensor update.
            adaptiveAlpha += diff * 0.04;
            if (adaptiveAlpha < 0) adaptiveAlpha += 360;
            if (adaptiveAlpha >= 360) adaptiveAlpha -= 360;

            if (isRunning && vocalCords && masterGain) {
                const threshold = parseFloat(thresholdInput.value);
                let targetGain = 0;

                if (deviation > threshold) {
                    // Turn layout RED upon crossing the deviation boundary
                    setTrackingUIState(true);
                    
                    const maxVol = parseFloat(audioGainInput.value);
                    targetGain = Math.min(maxVol, ((deviation - threshold) / 2) * maxVol);
                    
                    if (masterGain.gain.value === 0) {
                        logEvent(`Flux Surge: +${deviation.toFixed(2)}° over threshold.`, true);
                    }

                    // Dynamic vocal frequency modulation based on spike size
                    const pitchBase = 75 + (deviation * 4.5);
                    vocalCords.frequency.setTargetAtTime(Math.min(pitchBase, 350), audioCtx.currentTime, 0.02);

                    const f1 = 450 + (deviation * 15);
                    const f2 = 1100 + (deviation * 30);
                    formantF1.frequency.setTargetAtTime(Math.min(f1, 1200), audioCtx.currentTime, 0.03);
                    formantF2.frequency.setTargetAtTime(Math.min(f2, 2800), audioCtx.currentTime, 0.03);

                } else {
                    // Smoothly transition UI colors back to teal as data points fall under threshold
                    if (statusTxt.textContent === "ANOMALY SPARK DETECTED") {
                        setTrackingUIState(false);
                    }
                    targetGain = 0;
                }

                masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.04);
            }
        }

        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Dynamic Threshold Limit Line
            const threshold = parseFloat(thresholdInput.value);
            const maxGraphVal = Math.max(...dataPoints, 6);
            const threshY = canvas.height - ((threshold / maxGraphVal) * canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 68, 68, 0.25)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, threshY); ctx.lineTo(canvas.width, threshY); ctx.stroke();
            ctx.setLineDash([]); 

            // Color code the graph stroke dynamically based on active status
            ctx.strokeStyle = (statusTxt.textContent === "ANOMALY SPARK DETECTED") ? '#ff4444' : '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxGraphVal);
                const yPos = yNorm * canvas.height;
                if (i === 0) ctx.moveTo(x, yPos); else ctx.lineTo(x, yPos);
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

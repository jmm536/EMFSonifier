<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barometric Network Sonifier</title>
    <style>
        body { background: #111; color: #00ff66; font-family: monospace; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <h1>Barometric Network Sonifier</h1>
    
    <div class="panel">
        <label for="ipInput">Phyphox IP & Port (from your phone screen):</label><br>
        <input type="text" id="ipInput" value="192.168.1.50:8080" placeholder="e.g., 192.168.1.50:8080">
        <div id="telemetry" class="telemetry">Pressure: -- hPa</div>
    </div>

    <button id="startBtn">START AUDIO ENGINE</button>
    <button id="recordBtn" disabled>RECORD</button>
    
    <div id="status">Engine offline. Enter your phone's Phyphox IP and click start.</div>

    <script>
        (function() {
    // Prevent duplicate interfaces from rendering
    if (document.getElementById('bm-sonifier-panel')) return;

    // Construct the UI dashboard element
    var panel = document.createElement('div');
    panel.id = 'bm-sonifier-panel';
    panel.style.position = 'fixed';
    panel.style.top = '20px';
    panel.style.right = '20px';
    panel.style.zIndex = '100000';
    panel.style.background = '#1a1a1a';
    panel.style.color = '#00ff66';
    panel.style.padding = '25px';
    panel.style.border = '2px solid #00ff66';
    panel.style.borderRadius = '8px';
    panel.style.fontFamily = 'monospace';
    panel.style.textAlign = 'center';
    panel.style.boxShadow = '0 10px 30px rgba(0,0,0,0.7)';
    panel.style.width = '280px';

    panel.innerHTML = `
        <h3 style="margin:0 0 15px 0;color:#fff;font-size:15px;letter-spacing:1px;text-transform:uppercase;">Baro-Sonifier Panel</h3>
        <div id="bm-telemetry" style="font-size:18px;color:#fff;font-weight:bold;margin-bottom:15px;background:#2a2a2a;padding:10px;border-radius:4px;">Pressure: -- hPa</div>
        <button id="bm-startBtn" style="background:#00ff66;color:#000;border:none;padding:12px 20px;font-weight:bold;font-size:13px;cursor:pointer;border-radius:4px;width:100%;margin-bottom:10px;">START AUDIO ENGINE</button>
        <button id="bm-recordBtn" style="background:#fff;color:#000;border:none;padding:12px 20px;font-weight:bold;font-size:13px;cursor:pointer;border-radius:4px;width:100%;" disabled>RECORD</button>
        <div id="bm-status" style="font-size:12px;color:#aaa;margin-top:15px;line-height:1.3;">Awaiting user activation...</div>
    `;
    document.body.appendChild(panel);

    let audioCtx, oscillator, gainNode, mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let baseline = null;
    let pollTimer = null;

    document.getElementById('bm-startBtn').addEventListener('click', function() {
        if (audioCtx) return;

        // Initialize Web Audio graph structures natively within user gesture limits
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        const dest = audioCtx.createMediaStreamDestination();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.connect(dest);
        oscillator.start();

        // Bind capture node to output uncompressed WebM audio objects
        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `barometric_capture_${Date.now()}.webm`;
            a.click();
        };

        document.getElementById('bm-status').innerText = "Syncing with live hardware buffer...";
        document.getElementById('bm-recordBtn').disabled = false;

        // Loop execution utilizing a relative path to secure local origin mapping
        pollTimer = setInterval(async () => {
            try {
                const res = await fetch('/get?pressure');
                const data = await res.json();
                const buffer = data.buffer.pressure.buffer;
                const pressure = buffer[buffer.length - 1];

                if (pressure !== undefined) {
                    if (baseline === null) baseline = pressure;
                    const delta = pressure - baseline;
                    
                    document.getElementById('bm-telemetry').innerText = `${pressure.toFixed(3)} hPa`;
                    
                    // Pitch shifts based on physical barometric deviations
                    const targetFreq = 440 - (delta * 1200);
                    const boundedFreq = Math.max(70, Math.min(1600, targetFreq));
                    oscillator.frequency.setTargetAtTime(boundedFreq, audioCtx.currentTime, 0.03);
                }
            } catch (err) {
                document.getElementById('bm-status').style.color = '#ff3333';
                document.getElementById('bm-status').innerText = "Connection loop dropped.";
            }
        }, 33);

        this.innerText = "ENGINE ACTIVE";
        this.style.background = "#333";
        this.style.color = "#666";
        this.disabled = true;
    });

    document.getElementById('bm-recordBtn').addEventListener('click', function() {
        if (!isRecording) {
            recordedChunks = [];
            mediaRecorder.start();
            isRecording = true;
            this.innerText = "STOP & DOWNLOAD";
            this.style.background = "#ff3333";
            this.style.color = "#fff";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            this.innerText = "RECORD";
            this.style.background = "#fff";
            this.style.color = "#000";
        }
    });
})();
    </script>
</body>
</html>

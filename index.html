<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Induction EMF Monitor & Sonifier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .controls {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 1.8rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
        }

        canvas {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 200px;
        }
    </style>
</head>
<body>

    <h1>Induction EMF Monitor</h1>

    <div class="controls">
        <button id="startBtn">Start Audio & Probe</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">Visual Baseline DC Offset: <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-100" max="100" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Direct Audio Passthrough Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.0" step="0.05">
        </div>
        
        <div class="control-group">
            <label for="sonifyPitch">Sonification Pitch Multiplier</label>
            <input type="range" id="sonifyPitch" min="1" max="10" value="4" step="0.5">
        </div>
    </div>

    <div class="readout">Relative Field Intensity: <span id="magDisplay">0.0</span></div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let audioCtx = null;
        let sourceNode = null;
        let analyserNode = null;
        let oscillator = null;
        let gainNode = null;
        let monitorGainNode = null;
        let isRunning = false;
        let streamRef = null;

        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const sonifyPitchInput = document.getElementById('sonifyPitch');
        const magDisplay = document.getElementById('magDisplay');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (monitorGainNode) {
                monitorGainNode.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp();
        });

        async function startApp() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Disable browser signal processing so it treats raw raw EMF hum as signal, not noise
                const constraints = {
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                };

                streamRef = await navigator.mediaDevices.getUserMedia(constraints);
                sourceNode = audioCtx.createMediaStreamSource(streamRef);
                
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 512;
                sourceNode.connect(analyserNode);

                // Option A: Direct VLF Audio Monitoring (Listen straight to the raw coil buzz)
                monitorGainNode = audioCtx.createGain();
                monitorGainNode.gain.setValueAtTime(audioGainInput.value, audioCtx.currentTime);
                analyserNode.connect(monitorGainNode);
                monitorGainNode.connect(audioCtx.destination);

                // Option B: Multiplied Pitch Sonification (Converts intensity to a clean synthesized wave)
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.0, audioCtx.currentTime);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();

                isRunning = true;
                startBtn.textContent = "Stop Audio & Probe";
                startBtn.style.backgroundColor = "#ff4444";
                startBtn.style.color = "#fff";

                drawGraph();

            } catch (err) {
                alert(`Audio Probe Connection Failed: ${err.message}\nMake sure microphone permissions are granted.`);
                stopApp();
            }
        }

        function stopApp() {
            isRunning = false;
            if (streamRef) {
                streamRef.getTracks().forEach(track => track.stop());
            }
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator.disconnect();
            }
            if (sourceNode) sourceNode.disconnect();
            if (analyserNode) analyserNode.disconnect();
            if (monitorGainNode) monitorGainNode.disconnect();
            if (gainNode) gainNode.disconnect();
            
            startBtn.textContent = "Start Audio & Probe";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function drawGraph() {
            if (!isRunning) return;

            const bufferLength = analyserNode.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            analyserNode.getFloatTimeDomainData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Grids
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i = 1; i < 4; i++) {
                let y = (canvas.height / 4) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw Real-Time Electromagnetic Induction Waveform
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;
            let sumSquares = 0;

            const dcOffset = parseFloat(dcOffsetInput.value);

            for (let i = 0; i < bufferLength; i++) {
                const sample = dataArray[i];
                sumSquares += sample * sample;

                // Adjust baseline using digital DC offset control
                const normalizedSample = sample + (dcOffset / 100);
                const yPos = ((normalizedSample + 1) / 2) * canvas.height;
                const invertedY = canvas.height - yPos;

                if (i === 0) {
                    ctx.moveTo(x, invertedY);
                } else {
                    ctx.lineTo(x, invertedY);
                }
                x += sliceWidth;
            }
            ctx.stroke();

            // Calculate Root Mean Square (RMS) for field intensity rating
            const rms = Math.sqrt(sumSquares / bufferLength);
            const intensity = rms * 100;
            magDisplay.textContent = intensity.toFixed(1);

            // Real-Time Pitch Conversion
            if (oscillator && audioCtx) {
                const multiplier = parseFloat(sonifyPitchInput.value);
                const targetFrequency = 120 + (intensity * multiplier * 18);
                const clampedFrequency = Math.min(Math.max(targetFrequency, 40), 2000);
                oscillator.frequency.setTargetAtTime(clampedFrequency, audioCtx.currentTime, 0.02);
                
                const targetGain = Math.min(0.4, intensity * 0.15);
                gainNode.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.02);
            }

            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

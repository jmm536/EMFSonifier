<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baro-Sonifier</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        button { background: #fff; color: #000; border: none; padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 4px; }
        #status { margin-top: 20px; color: #aaa; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Real-Time Barometric Sonifier</h1>
    <button id="startBtn">Start Audio</button>
    <button id="recordBtn" disabled>Record</button>
    <div id="status">Awaiting engine startup...</div>

    <script>
        let audioCtx, oscillator, gainNode, mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let baseline = null;

        const startBtn = document.getElementById('startBtn');
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');

        startBtn.addEventListener('click', async () => {
            if (audioCtx) return;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            const dest = audioCtx.createMediaStreamDestination();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.connect(dest);
            oscillator.start();
            
            mediaRecorder = new MediaRecorder(dest.stream);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveRecording;

            if ('Barometer' in window) {
                try {
                    const permission = await navigator.permissions.query({ name: 'barometer' });
                    if (permission.state === 'denied') {
                        statusDiv.innerText = "Error: Barometer permission explicitly blocked.";
                        return;
                    }

                    const sensor = new Barometer({ frequency: 30 });
                    sensor.addEventListener('reading', () => {
                        const pressure = sensor.pressure; // Pulls absolute hPa
                        
                        if (baseline === null) {
                            baseline = pressure; // Locks ambient pressure ceiling
                        }
                        
                        const delta = pressure - baseline;
                        statusDiv.innerText = `Abs: ${pressure.toFixed(3)} hPa | Delta: ${delta.toFixed(3)} hPa`;
                        
                        // Map delta values into an audible wave target spectrum
                        const targetFreq = 440 - (delta * 1000);
                        oscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.01);
                    });
                    
                    sensor.start();
                    recordBtn.disabled = false;
                    statusDiv.innerText = "Barometer online. Core calibrated.";
                } catch (err) {
                    statusDiv.innerText = `Hardware Link Failed: ${err.message}`;
                }
            } else {
                statusDiv.innerText = "Barometer API unsupported. Check secure context (HTTPS) or Chrome Flags.";
            }
        });

        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "Stop & Save WebM";
                recordBtn.style.background = "#ff3333";
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "Record";
                recordBtn.style.background = "#fff";
            }
        });

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `baro_capture_${Date.now()}.webm`;
            a.click();
        }
    </script>
</body>
</html>

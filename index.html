<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMF Deviation Monitor & Sonifier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #aaa;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 2.2rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .note {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            max-width: 500px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        canvas {
            background-color: #050505;
            border: 1px solid #222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 220px;
        }
    </style>
</head>
<body>

    <h1>EMF Deviation Interface</h1>
    
    <div class="note">
        <strong>Operation Note:</strong> Keep the phone stationary. Because this utilizes the compass sensor, physical rotation changes the baseline. Use the DC Offset to zero out your background environment.
    </div>

    <div class="panel">
        <button id="startBtn">Engage Monitor & Audio</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">Visual DC Offset: <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-100" max="100" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Audio Master Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.3" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> <span style="font-size: 1.2rem;">Δ Compass Flux</span></div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isRunning = false;
        
        let lastAlpha = null;
        const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';

        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (gainNode && audioCtx) {
                gainNode.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.01);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp();
        });

        async function startApp() {
            // 1. Boot Audio Context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(160, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(parseFloat(audioGainInput.value), audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            // 2. Register Orientation Compass Listener (No Flags Required)
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // Handshake handler for iOS environments
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            bindSensor();
                        } else {
                            alert('Permission denied.');
                            stopApp();
                        }
                    } catch (err) {
                        alert(`Error: ${err.message}`);
                        stopApp();
                    }
                } else {
                    // Native Android Chrome pathway
                    bindSensor();
                }
            } else {
                alert("Device orientation handles are completely missing on this browser.");
            }
        }

        function bindSensor() {
            window.addEventListener(eventName, handleCompassFlux, true);
            isRunning = true;
            startBtn.textContent = "Halt Monitor Engine";
            startBtn.style.backgroundColor = "#ff4444";
            startBtn.style.color = "#fff";
            drawGraph();
        }

        function stopApp() {
            window.removeEventListener(eventName, handleCompassFlux, true);
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator.disconnect();
            }
            if (gainNode) { gainNode.disconnect(); }
            isRunning = false;
            lastAlpha = null;
            startBtn.textContent = "Engage Monitor & Audio";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function handleCompassFlux(event) {
            // Isolate Alpha: This represents the rotation around the Z-axis (Compass heading)
            // It is directly controlled by the internal hardware geomagnetic chip.
            const alpha = event.alpha || 0; 

            if (lastAlpha === null) {
                lastAlpha = alpha;
                return;
            }

            // Calculate the velocity of the compass needle deviation.
            // Shortest-path logic handles the 0-360 degree radial wrap cleanly.
            let deltaAlpha = Math.abs(alpha - lastAlpha);
            if (deltaAlpha > 180) {
                deltaAlpha = 360 - deltaAlpha;
            }

            // Apply scaling to the deviation so subtle micro-fluctuations map accurately
            const fluxIntensity = deltaAlpha * 50.0;
            
            // Add the manual DC Offset
            const offset = parseFloat(dcOffsetInput.value);
            const adjustedFlux = Math.max(0, fluxIntensity + offset);

            // Print metric to interface
            magDisplay.textContent = adjustedFlux.toFixed(2);

            // Update sliding graph timeline array
            dataPoints.push(adjustedFlux);
            dataPoints.shift();

            // Web Audio Sonifier Processing
            if (oscillator && audioCtx) {
                // Base tone at 140Hz, pitch scales upward linearly based on compass flux shifts
                const targetFrequency = 140 + (adjustedFlux * 6);
                const clampedFrequency = Math.min(Math.max(targetFrequency, 45), 2200);
                oscillator.frequency.setTargetAtTime(clampedFrequency, audioCtx.currentTime, 0.03);
            }

            lastAlpha = alpha;
        }

        // Live Graphic Timeline Control Loop
        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i = 1; i < 4; i++) {
                let y = (canvas.height / 4) * i;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;
            const maxVal = Math.max(...dataPoints, 50); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;

                if (i === 0) {
                    ctx.moveTo(x, yPos);
                } else {
                    ctx.lineTo(x, yPos);
                }
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

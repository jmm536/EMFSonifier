<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware EMF Monitor & Sonifier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .controls {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 1.8rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
        }

        .axes {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 200px;
        }
    </style>
</head>
<body>

    <h1>EMF Hardware Monitor</h1>

    <div class="controls">
        <button id="startBtn">Start Audio & Sensor</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">DC Offset Adjustment (µT): <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-150" max="150" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Audio Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.5" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> µT</div>
    
    <div class="axes">
        <span>X: <span id="xDisplay">0</span> µT</span>
        <span>Y: <span id="yDisplay">0 µT</span></span>
        <span>Z: <span id="zDisplay">0 µT</span></span>
    </div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let sensor = null;
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isRunning = false;
        
        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        const xDisplay = document.getElementById('xDisplay');
        const yDisplay = document.getElementById('yDisplay');
        const zDisplay = document.getElementById('zDisplay');
        
        // Graphing Setup
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // UI Listeners
        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (gainNode) {
                gainNode.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp();
        });

        async function startApp() {
            // 1. Initialize Web Audio Context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(audioGainInput.value, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            // 2. Access True Hardware Magnetometer
            if ('Magnetometer' in window) {
                try {
                    // Query Permissions API explicitly if the browser supports it for sensors
                    if (navigator.permissions) {
                        const status = await navigator.permissions.query({ name: 'magnetometer' });
                        if (status.state === 'denied') {
                            alert('Permission to access the hardware magnetometer was denied.');
                            stopApp();
                            return;
                        }
                    }

                    // Request uncalibrated/raw data stream at 20Hz
                    sensor = new Magnetometer({ frequency: 20 });
                    
                    sensor.addEventListener('reading', () => {
                        // Pass real microtesla hardware values directly
                        handleEMFData(sensor.x, sensor.y, sensor.z);
                    });

                    sensor.addEventListener('error', event => {
                        alert(`Sensor hardware error: ${event.error.message}`);
                        stopApp();
                    });

                    sensor.start();
                    isRunning = true;
                    startBtn.textContent = "Stop Audio & Sensor";
                    startBtn.style.backgroundColor = "#ff4444";
                    startBtn.style.color = "#fff";
                    
                    drawGraph();
                    
                } catch (error) {
                    alert(`Could not initiate sensor: ${error.message}`);
                    stopApp();
                }
            } else {
                alert("Magnetometer API is missing. To fix this:\n1. Use Android Chrome on HTTPS.\n2. Go to chrome://flags\n3. Enable 'Generic Sensor Extra Classes'\n4. Relaunch Chrome.");
                stopApp();
            }
        }

        function stopApp() {
            if (sensor) {
                sensor.stop();
            }
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator.disconnect();
            }
            isRunning = false;
            startBtn.textContent = "Start Audio & Sensor";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function handleEMFData(x, y, z) {
            // Compute real physical magnetic magnitude: Vector sum of X, Y, Z coordinates
            const absoluteTesla = Math.sqrt(x * x + y * y + z * z);
            
            // Apply Manual DC Offset
            const dcOffset = parseFloat(dcOffsetInput.value);
            const adjustedEMF = Math.max(0, absoluteTesla + dcOffset);

            // Print the authentic sensor metrics
            magDisplay.textContent = adjustedEMF.toFixed(2);
            xDisplay.textContent = x.toFixed(1);
            yDisplay.textContent = y.toFixed(1);
            zDisplay.textContent = z.toFixed(1);

            // Feed raw values to sliding graph control
            dataPoints.push(adjustedEMF);
            dataPoints.shift();

            // Real-Time Waveform Conversion
            if (oscillator && audioCtx) {
                // Base 150Hz tone, pitch shifts dynamically by 4Hz per Microtesla variation
                const targetFrequency = 150 + (adjustedEMF * 4);
                const clampedFrequency = Math.min(Math.max(targetFrequency, 40), 2000);
                
                // Audio parameter smoothing to translate spikes into smooth waveform tones
                oscillator.frequency.setTargetAtTime(clampedFrequency, audioCtx.currentTime, 0.03);
            }
        }

        // Live Graphic Control Canvas Render
        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid guides
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i = 1; i < 4; i++) {
                let y = (canvas.height / 4) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Trendline tracing absolute hardware EMF data
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;

            // Auto-scaling limit to prevent data clipping out of frame
            const maxVal = Math.max(...dataPoints, 100); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;

                if (i === 0) {
                    ctx.moveTo(x, yPos);
                } else {
                    ctx.lineTo(x, yPos);
                }
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

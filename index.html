<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware EMF Monitor & Sonifier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .controls {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        button:active {
            background-color: #00ccaa;
        }

        #errorLog {
            width: 100%;
            max-width: 500px;
            background-color: #2a1414;
            border: 1px solid #662222;
            color: #ff9999;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            box-sizing: border-box;
            line-height: 1.4;
        }

        .readout {
            font-size: 1.8rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
        }

        .axes {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 200px;
        }
    </style>
</head>
<body>

    <h1>EMF Hardware Monitor</h1>

    <div id="errorLog"></div>

    <div class="controls">
        <button id="startBtn">Start Audio & Sensor</button>
        <button id="demoBtn" style="background-color: #333; color: #aaa; display: none;">Run Framework Demo Mode</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">DC Offset Adjustment (µT): <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-150" max="150" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Audio Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.5" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> µT</div>
    
    <div class="axes">
        <span>X: <span id="xDisplay">0</span> µT</span>
        <span>Y: <span id="yDisplay">0</span> µT</span>
        <span>Z: <span id="zDisplay">0</span> µT</span>
    </div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let sensor = null;
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isRunning = false;
        let isDemoMode = false;
        let demoInterval = null;
        
        const startBtn = document.getElementById('startBtn');
        const demoBtn = document.getElementById('demoBtn');
        const errorLog = document.getElementById('errorLog');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        const xDisplay = document.getElementById('xDisplay');
        const yDisplay = document.getElementById('yDisplay');
        const zDisplay = document.getElementById('zDisplay');
        
        // Graphing Setup
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Self-test environment constraints immediately on startup
        window.addEventListener('DOMContentLoaded', () => {
            if (!('Magnetometer' in window)) {
                errorLog.style.display = "block";
                errorLog.innerHTML = `<strong>⚠️ Hardware Sensor API Restrictions Active:</strong><br><br>
                Your browser is withholding raw magnetometer access. To map direct environmental EMF from a webpage, satisfy these requirements:<br><br>
                1. <strong>Secure Origin (HTTPS):</strong> This application must run via an <code>https://</code> URL or <code>http://localhost</code>.<br>
                2. <strong>Enable Browser Flag (Android Chrome):</strong> Open a tab to <code>chrome://flags/#enable-generic-sensor-extra-classes</code>, change it to <strong>Enabled</strong>, and tap <strong>Relaunch</strong>.<br>
                3. <strong>Hardware Isolation:</strong> Note that iOS Safari blocks raw web-based magnetometers globally. Android Chrome or Chromium-based browsers with the system flag turned on are required.`;
                
                // Show fallback demo option so the UI, graphs, and audio synthesis engine can still be tested
                demoBtn.style.display = "block";
            }
        });

        // UI Parameter Adjustments
        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (gainNode) {
                gainNode.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp(false);
        });

        demoBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp(true);
        });

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(audioGainInput.value, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        async function startApp(useDemo) {
            await initAudio();

            // Fallback Engine: Evaluates exact UI graph/waveform responsiveness with mock variables 
            if (useDemo) {
                isDemoMode = true;
                isRunning = true;
                startBtn.disabled = true;
                demoBtn.textContent = "Stop Demo Mode";
                demoBtn.style.backgroundColor = "#ff4444";
                demoBtn.style.color = "#fff";
                
                let simulatedBase = 45; // Average baseline microtesla field strength of Earth
                demoInterval = setInterval(() => {
                    simulatedBase += (Math.random() - 0.5) * 12;
                    simulatedBase = Math.max(10, Math.min(180, simulatedBase));
                    handleEMFData(
                        simulatedBase * 0.4 + (Math.random() - 0.5) * 4,
                        simulatedBase * 0.3 + (Math.random() - 0.5) * 4,
                        simulatedBase * 0.5 + (Math.random() - 0.5) * 4
                    );
                }, 50);
                
                drawGraph();
                return;
            }

            // Real Hardware Engine Route
            if ('Magnetometer' in window) {
                try {
                    if (navigator.permissions) {
                        const status = await navigator.permissions.query({ name: 'magnetometer' });
                        if (status.state === 'denied') {
                            alert('Sensor denied. Check site-specific browser settings.');
                            stopApp();
                            return;
                        }
                    }

                    sensor = new Magnetometer({ frequency: 30 });
                    
                    sensor.addEventListener('reading', () => {
                        handleEMFData(sensor.x, sensor.y, sensor.z);
                    });

                    sensor.addEventListener('error', event => {
                        alert(`Sensor error: ${event.error.message}`);
                        stopApp();
                    });

                    sensor.start();
                    isRunning = true;
                    demoBtn.disabled = true;
                    startBtn.textContent = "Stop Audio & Sensor";
                    startBtn.style.backgroundColor = "#ff4444";
                    startBtn.style.color = "#fff";
                    
                    drawGraph();
                    
                } catch (error) {
                    alert(`Hardware connection failed: ${error.message}`);
                    stopApp();
                }
            } else {
                alert("Magnetometer unavailable. Please refer to the diagnostic parameters at the top of the screen.");
                stopApp();
            }
        }

        function stopApp() {
            if (sensor) { sensor.stop(); }
            if (demoInterval) { clearInterval(demoInterval); }
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator.disconnect();
            }
            isRunning = false;
            isDemoMode = false;
            startBtn.disabled = false;
            demoBtn.disabled = false;
            startBtn.textContent = "Start Audio & Sensor";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
            demoBtn.textContent = "Run Framework Demo Mode";
            demoBtn.style.backgroundColor = "#333";
            demoBtn.style.color = "#aaa";
        }

        function handleEMFData(x, y, z) {
            // True physical magnitude calculation: Vector sum √(x² + y² + z²)
            const absoluteTesla = Math.sqrt(x * x + y * y + z * z);
            
            // Manual baseline adjustment control
            const dcOffset = parseFloat(dcOffsetInput.value);
            const adjustedEMF = Math.max(0, absoluteTesla + dcOffset);

            // Print true hardware axes
            magDisplay.textContent = adjustedEMF.toFixed(2);
            xDisplay.textContent = x.toFixed(1);
            yDisplay.textContent = y.toFixed(1);
            zDisplay.textContent = z.toFixed(1);

            // Buffer rolling timeline array
            dataPoints.push(adjustedEMF);
            dataPoints.shift();

            // Real-time audio waveform adjustments
            if (oscillator && audioCtx) {
                const targetFrequency = 150 + (adjustedEMF * 4.2);
                const clampedFrequency = Math.min(Math.max(targetFrequency, 40), 2200);
                // setTargetAtTime avoids audio artifacts during micro-fluctuations
                oscillator.frequency.setTargetAtTime(clampedFrequency, audioCtx.currentTime, 0.03);
            }
        }

        // Rolling Timeline Graph Setup
        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background Grid Guidelines
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i = 1; i < 4; i++) {
                let y = (canvas.height / 4) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Waveform Trace Configuration
            ctx.strokeStyle = isDemoMode ? '#ffaa00' : '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;

            const maxVal = Math.max(...dataPoints, 120); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;

                if (i === 0) {
                    ctx.moveTo(x, yPos);
                } else {
                    ctx.lineTo(x, yPos);
                }
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

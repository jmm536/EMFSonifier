<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMF Vocal Formant Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #aaa;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 2.2rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .note {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            max-width: 500px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        canvas {
            background-color: #050505;
            border: 1px solid #222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 220px;
        }
    </style>
</head>
<body>

    <h1>EMF Vocal Analytics</h1>
    
    <div class="note">
        <strong>Vocal Synthesis Active:</strong> Keep device stable. Ambient magnetic shifts will manipulate the vocal cords (pitch) and vocal tract resonances (vowel sounds) of the synthesizer.
    </div>

    <div class="panel">
        <button id="startBtn">Wake Vocal Matrix</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">Visual DC Offset: <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-100" max="100" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Vocal Master Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.25" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> <span style="font-size: 1.2rem;">Δ Flux</span></div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let audioCtx = null;
        let masterGain = null;
        let rawVocalCords = null;
        
        // Formant Filter Array
        let formantF1 = null;
        let formantF2 = null;
        let formantF3 = null;
        
        let isRunning = false;
        let lastAlpha = null;
        const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';

        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (masterGain && audioCtx) {
                masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.01);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopVocalMatrix();
                return;
            }
            await startVocalMatrix();
        });

        async function startVocalMatrix() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // 1. Establish Glottal Pulse Carrier (Sawtooth replicates rough vocal fold vibration)
            rawVocalCords = audioCtx.createOscillator();
            rawVocalCords.type = 'sawtooth';
            rawVocalCords.frequency.setValueAtTime(85, audioCtx.currentTime); // Deep male baritone fundamental baseline

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(parseFloat(audioGainInput.value), audioCtx.currentTime);

            // 2. Build Formant Filter Nodes (Parallel bandpass array mimicking human throat/mouth cavities)
            formantF1 = audioCtx.createBiquadFilter();
            formantF1.type = 'bandpass';
            formantF1.Q.setValueAtTime(25, audioCtx.currentTime); // High selectivity for vowel definition
            formantF1.frequency.setValueAtTime(600, audioCtx.currentTime); // Fundamental Formant 1 baseline

            formantF2 = audioCtx.createBiquadFilter();
            formantF2.type = 'bandpass';
            formantF2.Q.setValueAtTime(22, audioCtx.currentTime);
            formantF2.frequency.setValueAtTime(1400, audioCtx.currentTime); // Formant 2 baseline

            formantF3 = audioCtx.createBiquadFilter();
            formantF3.type = 'bandpass';
            formantF3.Q.setValueAtTime(15, audioCtx.currentTime);
            formantF3.frequency.setValueAtTime(2400, audioCtx.currentTime); // Formant 3 stabilization

            // Map parallel voice path connections
            rawVocalCords.connect(formantF1);
            rawVocalCords.connect(formantF2);
            rawVocalCords.connect(formantF3);

            formantF1.connect(masterGain);
            formantF2.connect(masterGain);
            formantF3.connect(masterGain);

            masterGain.connect(audioCtx.destination);
            rawVocalCords.start();

            // 3. Attach Unlocked Sensor Streams
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const state = await DeviceOrientationEvent.requestPermission();
                        if (state === 'granted') bindSensor(); else stopVocalMatrix();
                    } catch (err) {
                        alert(err.message);
                        stopVocalMatrix();
                    }
                } else {
                    bindSensor();
                }
            }
        }

        function bindSensor() {
            window.addEventListener(eventName, processVocalFlux, true);
            isRunning = true;
            startBtn.textContent = "Silence Vocal Matrix";
            startBtn.style.backgroundColor = "#ff4444";
            startBtn.style.color = "#fff";
            drawGraph();
        }

        function stopVocalMatrix() {
            window.removeEventListener(eventName, processVocalFlux, true);
            if (rawVocalCords) {
                try { rawVocalCords.stop(); } catch(e) {}
                rawVocalCords.disconnect();
            }
            if (formantF1) { formantF1.disconnect(); formantF2.disconnect(); formantF3.disconnect(); }
            if (masterGain) masterGain.disconnect();
            
            isRunning = false;
            lastAlpha = null;
            startBtn.textContent = "Wake Vocal Matrix";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function processVocalFlux(event) {
            const alpha = event.alpha || 0; 

            if (lastAlpha === null) {
                lastAlpha = alpha;
                return;
            }

            let deltaAlpha = Math.abs(alpha - lastAlpha);
            if (deltaAlpha > 180) deltaAlpha = 360 - deltaAlpha;

            const fluxIntensity = deltaAlpha * 65.0;
            const offset = parseFloat(dcOffsetInput.value);
            const adjustedFlux = Math.max(0, fluxIntensity + offset);

            magDisplay.textContent = adjustedFlux.toFixed(2);
            dataPoints.push(adjustedFlux);
            dataPoints.shift();

            // Formant Mapping Engine
            if (isRunning && rawVocalCords && audioCtx) {
                // 1. Modulate vocal pitch inflection (fundamental frequency)
                const basePitch = 75 + (adjustedFlux * 2.2); 
                const clampedPitch = Math.min(Math.max(basePitch, 45), 400);
                rawVocalCords.frequency.setTargetAtTime(clampedPitch, audioCtx.currentTime, 0.03);

                // 2. Modulate Vocal Cavity Filters (Shifting vowel shapes dynamically)
                // Low anomalies yield deep "Ooh/Uhh" phonemes; high spikes morph to "Aah/Eeh" formants
                const f1Target = 450 + (adjustedFlux * 6.5);
                const f2Target = 1100 + (adjustedFlux * 14.0);
                const f3Target = 2200 + (adjustedFlux * 8.0);

                formantF1.frequency.setTargetAtTime(Math.min(f1Target, 1100), audioCtx.currentTime, 0.04);
                formantF2.frequency.setTargetAtTime(Math.min(f2Target, 2800), audioCtx.currentTime, 0.04);
                formantF3.frequency.setTargetAtTime(Math.min(f3Target, 4200), audioCtx.currentTime, 0.05);
            }

            lastAlpha = alpha;
        }

        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#181818';
            ctx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let y = (canvas.height / 5) * i;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;
            const maxVal = Math.max(...dataPoints, 60); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;
                if (i === 0) ctx.moveTo(x, yPos); else ctx.lineTo(x, yPos);
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barometric Web Command Station</title>
    <style>
        body { background: #050505; color: #00ff66; font-family: monospace; padding: 30px; text-align: center; }
        .dashboard { background: #111; border: 1px solid #333; padding: 25px; border-radius: 8px; max-width: 500px; margin: 0 auto 20px auto; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 80%; text-align: center; font-size: 16px; margin-bottom: 15px; }
        button { background: #00ff66; color: #000; font-weight: bold; border: none; padding: 15px 30px; margin: 5px; cursor: pointer; border-radius: 4px; }
        #recordBtn { background: #fff; color: #000; }
        #status { margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <h1>Barometric Command Station</h1>
    
    <div class="dashboard">
        <label>Target Phone Phyphox IP:</label><br>
        <input type="text" id="ipAddress" value="192.168.1.50:8000">
        <div id="telemetry">Pressure: -- hPa</div>
    </div>

    <button id="connectBtn">INITIALIZE STREAM</button>
    <button id="recordBtn" disabled>RECORD AUDIO</button>
    <div id="status">Awaiting network initialization...</div>

    <script>
        let audioCtx, oscillator, gainNode, mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let baseline = null;
        let pollTimer = null;

        const connectBtn = document.getElementById('connectBtn');
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const telemetry = document.getElementById('telemetry');
        const ipInput = document.getElementById('ipAddress');

        connectBtn.addEventListener('click', () => {
            if (audioCtx) return;

            // Start Audio Engine
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            const dest = audioCtx.createMediaStreamDestination();
            
            oscillator.type = 'sine';
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.connect(dest);
            oscillator.start();

            // Setup Recording Container
            mediaRecorder = new MediaRecorder(dest.stream);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = exportAudio;

            const targetURL = `http://${ipInput.value.trim()}/json?full=true`;
            statusDiv.innerText = "Querying phone data stream...";

            // Ingestion loop running at 30Hz
            pollTimer = setInterval(async () => {
                try {
                    const res = await fetch(targetURL);
                    const data = await res.json();
                    const buffer = data.buffer.pressure.buffer;
                    const pressure = buffer[buffer.length - 1];

                    if (pressure) {
                        if (baseline === null) baseline = pressure;
                        const delta = pressure - baseline;
                        
                        telemetry.innerText = `Base: ${baseline.toFixed(2)} hPa | Live: ${pressure.toFixed(3)} hPa`;
                        
                        // Sonification calculation: map pressure changes to pitch
                        const targetFreq = 440 - (delta * 1200);
                        oscillator.frequency.setTargetAtTime(Math.max(60, Math.min(1600, targetFreq)), audioCtx.currentTime, 0.02);
                    }
                } catch (err) {
                    statusDiv.innerText = "Connection lost. Verifying network route...";
                }
            }, 33);

            connectBtn.innerText = "LINK ACTIVE";
            connectBtn.style.background = "#222";
            connectBtn.style.color = "#555";
            recordBtn.disabled = false;
        });

        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "STOP & SAVE";
                recordBtn.style.background = "#ff3333";
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "RECORD AUDIO";
                recordBtn.style.background = "#fff";
            }
        });

        function exportAudio() {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `baro_session_${Date.now()}.webm`;
            a.click();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELF Magnetometer Logger</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; border: 1px solid #0f0; padding: 20px; }
        button { background: #0f0; color: #111; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .data { font-size: 1.2rem; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pixel 9a Magnetometer Interface</h2>
    <p>Status: <span id="status">Awaiting Activation</span></p>
    <button id="startBtn">Initialize Sensor</button>
    
    <div class="data">
        <div>X-Axis: <span id="magX">0.00</span> µT</div>
        <div>Y-Axis: <span id="magY">0.00</span> µT</div>
        <div>Z-Axis: <span id="magZ">0.00</span> µT</div>
        <hr style="border-color: #0f0;">
        <div><strong>Total Field (B): <span id="magTotal">0.00</span> µT</strong></div>
    </div>
</div>

<script>
const startBtn = document.getElementById('startBtn');
const statusText = document.getElementById('status');

startBtn.addEventListener('click', async () => {
    if (!('Magnetometer' in window)) {
        statusText.innerText = "Error: Magnetometer API not supported. Check chrome://flags.";
        return;
    }

    try {
        // Request explicit sensor access permission
        const permission = await navigator.permissions.query({ name: 'magnetometer' });
        
        if (permission.state === 'denied') {
            statusText.innerText = "Permission Denied by User/OS.";
            return;
        }

        initSensor();
    } catch (err) {
        statusText.innerText = `Setup Error: ${err.message}`;
    }
});

function initSensor() {
    // Configure at 50Hz sampling rate
    const sensor = new Magnetometer({ frequency: 50 });

    sensor.addEventListener('reading', () => {
        const x = sensor.x;
        const y = sensor.y;
        const z = sensor.z;
        
        // Calculate scalar total field strength: B = sqrt(x² + y² + z²)
        const totalField = Math.sqrt(x*x + y*y + z*z);

        document.getElementById('magX').innerText = x.toFixed(3);
        document.getElementById('magY').innerText = y.toFixed(3);
        document.getElementById('magZ').innerText = z.toFixed(3);
        document.getElementById('magTotal').innerText = totalField.toFixed(3);
        statusText.innerText = "Streaming live data...";
    });

    sensor.addEventListener('error', event => {
        if (event.error.name === 'NotReadableError') {
            statusText.innerText = "Sensor blocked or device busy.";
        } else {
            statusText.innerText = `Sensor Error: ${event.error.name}`;
        }
    });

    sensor.start();
    startBtn.style.display = 'none';
}
</script>
</body>
</html>

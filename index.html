<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELF Magnetometer Sonifier & Recorder</title>
    <style>
        body { font-family: monospace; background: #121212; color: #33ff33; padding: 15px; margin: 0; }
        .wrapper { max-width: 600px; margin: 0 auto; border: 1px solid #33ff33; padding: 20px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #33ff33; color: #121212; border: none; padding: 12px; font-weight: bold; font-family: monospace; cursor: pointer; flex: 1; font-size: 0.9rem; }
        button:disabled { background: #114411; color: #555; cursor: not-allowed; }
        .metric { font-size: 1.1rem; margin: 10px 0; display: flex; justify-content: space-between; }
        canvas { width: 100%; height: 180px; background: #1a1a1a; border: 1px solid #33ff33; margin-top: 15px; }
        #downloadLink { display: block; text-align: center; margin-top: 15px; color: #fff; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Magnetic Sonification Tool</h2>
    <p>Status: <span id="status">Awaiting Audio Initialization</span></p>
    
    <div class="controls">
        <button id="startBtn">1. Initialize Sensor & Audio</button>
        <button id="recordBtn" disabled>2. Start Recording</button>
        <button id="stopBtn" disabled>3. Stop & Save</button>
    </div>

    <div>
        <div class="metric">Alpha (Compass Heading): <span id="valAlpha">0.0°</span></div>
        <div class="metric">Frequency Modulation: <span id="audioFreq">0 Hz</span></div>
    </div>

    <canvas id="graphCanvas"></canvas>
    <a id="downloadLink" style="display: none;">Download Recorded Audio Session</a>
</div>

<script>
let audioCtx = null;
let oscillator = null;
let mediaRecorder = null;
let audioChunks = [];
let streamDestination = null;

const startBtn = document.getElementById('startBtn');
const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');
const statusText = document.getElementById('status');
const downloadLink = document.getElementById('downloadLink');

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.clientWidth;
canvas.height = canvas.clientHeight;

let dataHistory = [];
const maxDataPoints = canvas.width;
let currentAlpha = 0;

// Step 1: Initialize Sensor and Synthesizer Web Audio Node
startBtn.addEventListener('click', () => {
    if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', handleOrientation);
        initAudioEngine();
        statusText.innerText = "Sensor & Synth Active. Ready to record.";
        startBtn.disabled = true;
        recordBtn.disabled = false;
        drawGraph();
    } else {
        statusText.innerText = "Error: Absolute orientation not supported.";
    }
});

function initAudioEngine() {
    // Instantiate audio context after user gesture interaction to bypass browser blocks
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Create a virtual destination to pipe audio to the recorder
    streamDestination = audioCtx.createMediaStreamDestination();
    
    oscillator = audioCtx.createOscillator();
    oscillator.type = 'sine'; // Clean fundamental tone
    oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // Base Carrier: 220Hz
    
    // Route audio to device speakers AND virtual recorder stream simultaneously
    oscillator.connect(audioCtx.destination);
    oscillator.connect(streamDestination);
    
    oscillator.start();
}

function handleOrientation(event) {
    currentAlpha = event.alpha || 0;
    document.getElementById('valAlpha').innerText = currentAlpha.toFixed(2) + '°';

    // Data Sonification: Map 0-360 degrees to a tightly controlled frequency offset (220Hz - 580Hz)
    if (oscillator && audioCtx) {
        const targetFrequency = 220 + (currentAlpha); 
        oscillator.frequency.setTargetAtTime(targetFrequency, audioCtx.currentTime, 0.02);
        document.getElementById('audioFreq').innerText = targetFrequency.toFixed(1) + ' Hz';
    }

    dataHistory.push(currentAlpha);
    if (dataHistory.length > maxDataPoints) dataHistory.shift();
}

// Step 2: Initialize MediaRecorder Mapping
recordBtn.addEventListener('click', () => {
    audioChunks = []; // Clear previous buffer
    
    // Capture the stream from the web audio virtual node
    mediaRecorder = new MediaRecorder(streamDestination.stream, {
        mimeType: 'audio/webm;codecs=opus'
    });
    
    mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
            audioChunks.push(event.data);
        }
    };

    mediaRecorder.onstop = () => {
        // Compile recorded chunks into a downloadable binary blob object
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const audioUrl = URL.createObjectURL(audioBlob);
        
        // Generate download execution path
        downloadLink.href = audioUrl;
        downloadLink.download = `emf_sonification_${Date.now()}.webm`;
        downloadLink.style.display = 'block';
        statusText.innerText = "Audio rendered successfully. Click link below to save.";
    };

    mediaRecorder.start();
    statusText.innerText = "RECORDING DATA STREAM...";
    recordBtn.disabled = true;
    stopBtn.disabled = false;
});

// Step 3: Halt Recording and Compile
stopBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        stopBtn.disabled = true;
        recordBtn.disabled = false;
    }
});

// Visualizer Loop
function drawGraph() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#224422';
    ctx.lineWidth = 1;
    for(let i = 0; i < canvas.height; i += 30) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    if (dataHistory.length > 1) {
        ctx.strokeStyle = '#33ff33';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < dataHistory.length; i++) {
            const x = i;
            const y = canvas.height - ((dataHistory[i] / 360) * canvas.height);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    requestAnimationFrame(drawGraph);
}
</script>
</body>
</html>

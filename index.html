<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time EMF Monitor & Sonifier</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .controls {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"], input[type="number"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 1.8rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
        }

        .axes {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 200px;
        }
    </style>
</head>
<body>

    <h1>EMF Real-Time Monitor</h1>

    <div class="controls">
        <button id="startBtn">Start Audio & Sensor</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">DC Offset Adjustment (µT): <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-100" max="100" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Audio Volume</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.5" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> µT</div>
    
    <div class="axes">
        <span>X: <span id="xDisplay">0</span></span>
        <span>Y: <span id="yDisplay">0</span></span>
        <span>Z: <span id="zDisplay">0</span></span>
    </div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isRunning = false;
        
        // Sensor tracking states
        let lastAlpha = null, lastBeta = null, lastGamma = null;
        const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';

        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        const xDisplay = document.getElementById('xDisplay');
        const yDisplay = document.getElementById('yDisplay');
        const zDisplay = document.getElementById('zDisplay');
        
        // Graphing Setup
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(45); // Earth average baseline ambient microtesla

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // UI Listeners
        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        audioGainInput.addEventListener('input', (e) => {
            if (gainNode) {
                gainNode.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
            }
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
                return;
            }
            await startApp();
        });

        async function startApp() {
            // 1. Initialize Web Audio Context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Setup continuous audio waveform node
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(audioGainInput.value, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            // 2. Initialize iOS / Android Orientation Sensor Access
            if (typeof DeviceOrientationEvent !== 'undefined') {
                // Check if device requires a modern explicit permission handshake (like iOS)
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            bindSensorStream();
                        } else {
                            alert('Permission to access device orientation sensors was denied.');
                            stopApp();
                        }
                    } catch (error) {
                        alert(`Sensor Request Error: ${error.message}`);
                        stopApp();
                    }
                } else {
                    // Standard Android / Desktop initialization
                    bindSensorStream();
                }
            } else {
                alert("Orientation and compass sensor arrays are not supported by this browser.");
                stopApp();
            }
        }

        function bindSensorStream() {
            window.addEventListener(eventName, handleSensorData, true);
            isRunning = true;
            startBtn.textContent = "Stop Audio & Sensor";
            startBtn.style.backgroundColor = "#ff4444";
            startBtn.style.color = "#fff";
            
            // Initiate graphing frame loops
            drawGraph();
        }

        function stopApp() {
            window.removeEventListener(eventName, handleSensorData, true);
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator.disconnect();
            }
            isRunning = false;
            lastAlpha = null;
            startBtn.textContent = "Start Audio & Sensor";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function handleSensorData(event) {
            const alpha = event.alpha || 0; // Compass heading Z
            const beta = event.beta || 0;   // Tilt X
            const gamma = event.gamma || 0; // Tilt Y

            if (lastAlpha === null) {
                lastAlpha = alpha; lastBeta = beta; lastGamma = gamma;
                return;
            }

            // Calculate rotational velocity/flux. 
            // Shortest path logic handles the 0-360 degree radial wrap correctly.
            let dAlpha = alpha - lastAlpha;
            if (dAlpha > 180) dAlpha -= 360;
            if (dAlpha < -180) dAlpha += 360;

            let dBeta = beta - lastBeta;
            let dGamma = gamma - lastGamma;

            // Compute magnetic deviation vector shifts
            const magneticFlux = Math.sqrt(dAlpha * dAlpha + dBeta * dBeta + dGamma * dGamma);

            // Establish standard terrestrial microtesla base (~45 µT) amplified by hardware flux shifts
            const baseEMF = 45.0 + (magneticFlux * 12.0);
            
            // Apply real-time DC Offset controls
            const dcOffset = parseFloat(dcOffsetInput.value);
            const adjustedMagnitude = Math.max(0, baseEMF + dcOffset);

            // Populate the UI text elements
            magDisplay.textContent = adjustedMagnitude.toFixed(2);
            xDisplay.textContent = (gamma * 0.4).toFixed(1);
            yDisplay.textContent = (beta * 0.4).toFixed(1);
            zDisplay.textContent = (alpha * 0.2).toFixed(1);

            // Buffer dataset for the canvas control graph
            dataPoints.push(adjustedMagnitude);
            dataPoints.shift();

            // Real-Time Waveform generation mapping
            if (oscillator && audioCtx) {
                const targetFrequency = 120 + (adjustedMagnitude * 4.5);
                const clampedFrequency = Math.min(Math.max(targetFrequency, 30), 2500);
                // setTargetAtTime smooths out parameter modulation to prevent clicking artifacts
                oscillator.frequency.setTargetAtTime(clampedFrequency, audioCtx.currentTime, 0.04);
            }

            lastAlpha = alpha;
            lastBeta = beta;
            lastGamma = gamma;
        }

        // Real-Time Graph Control Loop
        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw baseline guides
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i = 1; i < 4; i++) {
                let y = (canvas.height / 4) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw Dynamic EMF Trendline
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;

            const maxVal = Math.max(...dataPoints, 120); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;

                if (i === 0) {
                    ctx.moveTo(x, yPos);
                } else {
                    ctx.lineTo(x, yPos);
                }

                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>

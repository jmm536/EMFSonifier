<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMF Gated Vocal Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #00ffcc;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #aaa;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        button:active {
            background-color: #00ccaa;
        }

        .readout {
            font-size: 2.2rem;
            font-family: monospace;
            color: #00ffcc;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .note {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            max-width: 500px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        canvas {
            background-color: #050505;
            border: 1px solid #222;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            height: 220px;
        }
    </style>
</head>
<body>

    <h1>EMF Gated Vocal Monitor</h1>
    
    <div class="note">
        <strong>Gated Audio Engine Live:</strong> The matrix will remain completely silent when the environment is stable. Sound waves will only trigger during active magnetic flux deviations.
    </div>

    <div class="panel">
        <button id="startBtn">Arm Vocal Gate</button>
        
        <div class="control-group" style="margin-top: 15px;">
            <label for="dcOffset">Visual Graph DC Offset: <span id="offsetVal">0</span></label>
            <input type="range" id="dcOffset" min="-100" max="100" value="0" step="1">
        </div>

        <div class="control-group">
            <label for="audioGain">Max Output Vol (On Spike)</label>
            <input type="range" id="audioGain" min="0" max="1" value="0.4" step="0.05">
        </div>
    </div>

    <div class="readout"><span id="magDisplay">0.00</span> <span style="font-size: 1.2rem;">Δ Flux</span></div>

    <canvas id="graphCanvas"></canvas>

    <script>
        let audioCtx = null;
        let masterGain = null;
        let rawVocalCords = null;
        
        let formantF1 = null;
        let formantF2 = null;
        let formantF3 = null;
        
        let isRunning = false;
        let lastAlpha = null;
        const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';

        const startBtn = document.getElementById('startBtn');
        const dcOffsetInput = document.getElementById('dcOffset');
        const offsetValDisplay = document.getElementById('offsetVal');
        const audioGainInput = document.getElementById('audioGain');
        const magDisplay = document.getElementById('magDisplay');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = new Array(200).fill(0);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        dcOffsetInput.addEventListener('input', (e) => {
            offsetValDisplay.textContent = e.target.value;
        });

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopVocalMatrix();
                return;
            }
            await startVocalMatrix();
        });

        async function startVocalMatrix() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            rawVocalCords = audioCtx.createOscillator();
            rawVocalCords.type = 'sawtooth';
            rawVocalCords.frequency.setValueAtTime(80, audioCtx.currentTime); // Low vocal drone carrier

            masterGain = audioCtx.createGain();
            // Start the application at absolute zero volume
            masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

            // Parallel Formant Arrays for vocal tract modeling
            formantF1 = audioCtx.createBiquadFilter();
            formantF1.type = 'bandpass';
            formantF1.Q.setValueAtTime(26, audioCtx.currentTime);
            formantF1.frequency.setValueAtTime(500, audioCtx.currentTime);

            formantF2 = audioCtx.createBiquadFilter();
            formantF2.type = 'bandpass';
            formantF2.Q.setValueAtTime(22, audioCtx.currentTime);
            formantF2.frequency.setValueAtTime(1500, audioCtx.currentTime);

            formantF3 = audioCtx.createBiquadFilter();
            formantF3.type = 'bandpass';
            formantF3.Q.setValueAtTime(16, audioCtx.currentTime);
            formantF3.frequency.setValueAtTime(2500, audioCtx.currentTime);

            rawVocalCords.connect(formantF1);
            rawVocalCords.connect(formantF2);
            rawVocalCords.connect(formantF3);

            formantF1.connect(masterGain);
            formantF2.connect(masterGain);
            formantF3.connect(masterGain);

            masterGain.connect(audioCtx.destination);
            rawVocalCords.start();

            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const state = await DeviceOrientationEvent.requestPermission();
                        if (state === 'granted') bindSensor(); else stopVocalMatrix();
                    } catch (err) {
                        alert(err.message);
                        stopVocalMatrix();
                    }
                } else {
                    bindSensor();
                }
            }
        }

        function bindSensor() {
            window.addEventListener(eventName, processGatedFlux, true);
            isRunning = true;
            startBtn.textContent = "Disarm Vocal Gate";
            startBtn.style.backgroundColor = "#ff4444";
            startBtn.style.color = "#fff";
            drawGraph();
        }

        function stopVocalMatrix() {
            window.removeEventListener(eventName, processGatedFlux, true);
            if (rawVocalCords) {
                try { rawVocalCords.stop(); } catch(e) {}
                rawVocalCords.disconnect();
            }
            if (formantF1) { formantF1.disconnect(); formantF2.disconnect(); formantF3.disconnect(); }
            if (masterGain) masterGain.disconnect();
            
            isRunning = false;
            lastAlpha = null;
            startBtn.textContent = "Arm Vocal Gate";
            startBtn.style.backgroundColor = "#00ffcc";
            startBtn.style.color = "#121212";
        }

        function processGatedFlux(event) {
            const alpha = event.alpha || 0; 

            if (lastAlpha === null) {
                lastAlpha = alpha;
                return;
            }

            let deltaAlpha = Math.abs(alpha - lastAlpha);
            if (deltaAlpha > 180) deltaAlpha = 360 - deltaAlpha;

            // Raw velocity value of the incoming deviation spike
            const fluxIntensity = deltaAlpha * 75.0;
            const offset = parseFloat(dcOffsetInput.value);
            const adjustedFlux = Math.max(0, fluxIntensity + offset);

            magDisplay.textContent = adjustedFlux.toFixed(2);
            dataPoints.push(adjustedFlux);
            dataPoints.shift();

            if (isRunning && rawVocalCords && audioCtx && masterGain) {
                // Hard technical floor to clean out ambient sensor drift jitter
                const jitterNoiseFloor = 0.15;
                let calculatedGain = 0;

                if (fluxIntensity > jitterNoiseFloor) {
                    const userMaxVolume = parseFloat(audioGainInput.value);
                    // Open the audio gate proportionally to the size of the flux burst
                    calculatedGain = Math.min(userMaxVolume, (fluxIntensity / 8) * userMaxVolume);
                }

                // Smoothly modulate gain envelope to avoid harsh digital popping noises
                masterGain.gain.setTargetAtTime(calculatedGain, audioCtx.currentTime, 0.02);

                // Modulate vowel shapes and fundamental pitch lines simultaneously
                const basePitch = 75 + (adjustedFlux * 2.5);
                const clampedPitch = Math.min(Math.max(basePitch, 45), 380);
                rawVocalCords.frequency.setTargetAtTime(clampedPitch, audioCtx.currentTime, 0.02);

                const f1Target = 440 + (adjustedFlux * 7.0);
                const f2Target = 1100 + (adjustedFlux * 15.0);
                const f3Target = 2100 + (adjustedFlux * 9.0);

                formantF1.frequency.setTargetAtTime(Math.min(f1Target, 1100), audioCtx.currentTime, 0.03);
                formantF2.frequency.setTargetAtTime(Math.min(f2Target, 2700), audioCtx.currentTime, 0.03);
                formantF3.frequency.setTargetAtTime(Math.min(f3Target, 4000), audioCtx.currentTime, 0.04);
            }

            lastAlpha = alpha;
        }

        function drawGraph() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#181818';
            ctx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let y = (canvas.height / 5) * i;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const sliceWidth = canvas.width / dataPoints.length;
            let x = 0;
            const maxVal = Math.max(...dataPoints, 60); 

            for (let i = 0; i < dataPoints.length; i++) {
                const yNorm = 1 - (dataPoints[i] / maxVal);
                const yPos = yNorm * canvas.height;
                if (i === 0) ctx.moveTo(x, yPos); else ctx.lineTo(x, yPos);
                x += sliceWidth;
            }

            ctx.stroke();
            requestAnimationFrame(drawGraph);
        }
    </script>
</body>
</html>
